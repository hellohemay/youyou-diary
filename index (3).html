<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😔 悠悠DIARY</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:#bae6fd;color:#0369a1;min-height:100vh;padding-bottom:20px}.container{max-width:600px;margin:0 auto;padding:20px}.header{text-align:center;color:#0369a1;margin-bottom:30px;padding-top:20px}.header h1{font-size:28px;font-weight:600;margin-bottom:5px}.header p{font-size:14px;opacity:0.8}.login-page{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;text-align:center}.login-card{background:#fff;padding:40px;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,0.1);max-width:400px}.login-card h2{font-size:32px;margin-bottom:15px;color:#0284c7}.login-card p{color:#666;margin-bottom:20px;line-height:1.6}.encouragement{text-align:center;color:#0369a1;font-size:14px;font-weight:600;margin-bottom:20px;padding:12px;background:#cffafe;border-radius:8px}.login-btn{width:100%;padding:14px;border:none;border-radius:12px;background:#0284c7;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s}.login-btn:hover{transform:translateY(-2px)}.main-page{display:none}.user-info{display:flex;justify-content:space-between;background:#cffafe;color:#0369a1;padding:12px 16px;border-radius:10px;margin-bottom:20px}.logout-btn{background:#0284c7;border:none;color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}.tabs{display:flex;gap:10px;margin-bottom:20px}.tab-btn{flex:1;padding:12px;border:2px solid #cffafe;background:#fff;color:#0369a1;border-radius:8px;cursor:pointer;font-weight:600;transition:all 0.2s}.tab-btn.active{background:#0284c7;color:#fff;border-color:#0284c7}.tab-content{display:none}.tab-content.active{display:block}.form-group{margin-bottom:20px}.form-label{display:block;margin-bottom:8px;font-weight:600;font-size:14px}.form-input{width:100%;padding:12px;border:2px solid #cffafe;border-radius:8px;font-size:14px;font-family:inherit}.form-input:focus{outline:none;border-color:#0284c7}textarea.form-input{resize:vertical}.checkbox-group{display:grid;grid-template-columns:1fr 1fr;gap:10px}.checkbox-item{display:flex;align-items:center;padding:10px;background:#fff;border-radius:8px;cursor:pointer}.checkbox-item input{margin-right:8px}.intensity-slider{width:100%;height:6px;border-radius:3px;background:#38bdf8;outline:0;-webkit-appearance:none;appearance:none;margin-bottom:8px}.intensity-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:#0284c7;cursor:pointer}.intensity-slider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#0284c7;cursor:pointer;border:0}.intensity-display{display:flex;justify-content:space-between;font-size:12px;color:#999}.save-btn{width:100%;padding:14px;border:none;border-radius:12px;background:#0284c7;color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:20px}.save-btn:hover{transform:translateY(-2px)}.success-msg{display:none;background:#cffafe;color:#0369a1;padding:12px 16px;border-radius:8px;margin-bottom:20px;text-align:center;font-weight:600}.stats-section{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}.stats-title{font-size:13px;font-weight:600;margin-bottom:12px;color:#0369a1}.week-chart{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px}.day-card{background:#f0f9ff;padding:12px 8px;border-radius:8px;text-align:center}.day-card.has-record{background:#0284c7;color:#fff}.day-count{font-weight:600;font-size:16px}.stat-card{background:linear-gradient(135deg,#f0f9ff,#cffafe);border-radius:12px;padding:16px;border-left:4px solid #0284c7;margin-bottom:12px}.stat-label{font-size:12px;color:#666;margin-bottom:4px}.stat-value{font-size:28px;font-weight:700;color:#0284c7}.records-section{margin-top:30px}.records-title{font-size:18px;font-weight:600;margin-bottom:15px;color:#0369a1}.record-card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px;border-left:4px solid #0284c7;cursor:pointer}.record-card:hover{box-shadow:0 5px 15px rgba(2,132,199,0.2);transform:translateY(-2px)}.record-time{font-size:12px;color:#999;margin-bottom:8px}.record-intensity{display:inline-block;background:#f0f9ff;color:#0369a1;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:600;margin-bottom:8px}.record-content{font-size:14px;color:#333;line-height:1.6}.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background-color:rgba(0,0,0,0.5)}.modal-content{background-color:#fff;margin:10% auto;padding:30px;border-radius:16px;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:2px solid #f0f9ff;padding-bottom:15px}.modal-header h2{color:#0369a1;margin:0}.modal-close{background:0;border:0;font-size:24px;cursor:pointer;color:#999}.modal-body{margin-bottom:20px;color:#333;line-height:1.8}.modal-detail-item{margin-bottom:12px;font-size:14px}.modal-detail-label{font-weight:600;color:#0369a1;display:inline-block;width:80px}.modal-footer{display:flex;gap:10px;justify-content:flex-end}.modal-delete-btn{background:#ef4444;color:#fff;border:0;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600}.modal-delete-btn:hover{background:#dc2626}.modal-close-btn{background:#e5e7eb;color:#333;border:0;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600}.modal-close-btn:hover{background:#d1d5db}
    </style>
</head>
<body>
    <div id="recordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>📝 記錄詳情</h2><button class="modal-close" onclick="closeRecordModal()">✕</button></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer"><button class="modal-close-btn" onclick="closeRecordModal()">關閉</button><button class="modal-delete-btn" onclick="deleteCurrentRecord()">🗑️ 刪除記錄</button></div>
        </div>
    </div>

    <div id="loginPage" class="login-page">
        <div class="login-card"><h2>😔 悠悠DIARY</h2><p>當悠悠來敲門時<br/>請停下來，傾聽自己</p><div id="loginEncouragement" class="encouragement"></div><button class="login-btn" onclick="handleLogin()">📝 開始使用</button></div>
    </div>

    <div id="mainPage" class="main-page">
        <div class="container">
            <div class="header"><h1>😔 悠悠DIARY</h1><p>傾聽自己的聲音</p></div>
            <div class="user-info"><span>👤 <span id="userName">訪客</span></span><button class="logout-btn" onclick="handleLogout()">登出</button></div>
            <div id="successMsg" class="success-msg"></div>

            <div class="stats-section">
                <div class="stats-title">💡 本週悠悠</div>
                <div id="weekChart" class="week-chart"></div>
                <div id="statsContainer"></div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('record')">➕ 當下記錄</button>
                <button class="tab-btn" onclick="switchTab('daily')">📅 一日回饋</button>
            </div>

            <div id="recordTab" class="tab-content active">
                <div id="successMsg" class="success-msg"></div>
                <div style="background:#fff;padding:20px;border-radius:12px;">
                    <h3 style="font-size:20px;color:#0369a1;margin-bottom:15px;">😔 悠悠發生了什麼？</h3>

                    <div class="form-group">
                        <label class="form-label">💭 感受</label>
                        <textarea id="feeling" class="form-input" placeholder="描述你現在的感受..." rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">⚡ 強度等級</label>
                        <input type="range" id="intensity" class="intensity-slider" min="1" max="10" value="5" oninput="updateIntensityDisplay()">
                        <div class="intensity-display"><span>輕微</span><span style="font-weight:600;color:#0284c7;" id="intensityLabel">5 - 中度</span><span>嚴重</span></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">🫀 身體感受</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" class="bodySensation" value="疲倦/無力"> 疲倦/無力</label>
                            <label class="checkbox-item"><input type="checkbox" class="bodySensation" value="頭痛/身體痛"> 頭痛/身體痛</label>
                            <label class="checkbox-item"><input type="checkbox" class="bodySensation" value="緊張/想抓東西"> 緊張/想抓東西</label>
                            <label class="checkbox-item"><input type="checkbox" class="bodySensation" value="胸悶/身體緊繃"> 胸悶/身體緊繃</label>
                            <label class="checkbox-item"><input type="checkbox" class="bodySensation" value="身體重重"> 身體重重</label>
                        </div>
                        <label class="form-label" style="margin-top:12px;">其他身體感受</label>
                        <input type="text" id="bodySensationOther" class="form-input" placeholder="如果上述選項未包含...">
                    </div>

                    <div class="form-group">
                        <label class="form-label">🎯 觸發點（可選）</label>
                        <input type="text" id="trigger" class="form-input" placeholder="是什麼觸發了悠悠？">
                    </div>

                    <div class="form-group">
                        <label class="form-label">👥 與人接觸人數</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="radio" name="contact" value="沒有人"> 沒有人</label>
                            <label class="checkbox-item"><input type="radio" name="contact" value="1-2人"> 1-2人</label>
                            <label class="checkbox-item"><input type="radio" name="contact" value="3-5人"> 3-5人</label>
                            <label class="checkbox-item"><input type="radio" name="contact" value="5人以上"> 5人以上</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">⏱️ 與人接觸時間</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="radio" name="contactTime" value="30分以內"> 30分以內</label>
                            <label class="checkbox-item"><input type="radio" name="contactTime" value="30分-2小時"> 30分-2小時</label>
                            <label class="checkbox-item"><input type="radio" name="contactTime" value="2-5小時"> 2-5小時</label>
                            <label class="checkbox-item"><input type="radio" name="contactTime" value="5小時以上"> 5小時以上</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">🎯 你現在做了什麼？</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" class="coping" value="純紀錄"> 純紀錄</label>
                            <label class="checkbox-item"><input type="checkbox" class="coping" value="深呼吸/拍拍自己"> 深呼吸/拍拍自己</label>
                            <label class="checkbox-item"><input type="checkbox" class="coping" value="聽音樂"> 聽音樂</label>
                            <label class="checkbox-item"><input type="checkbox" class="coping" value="散步/運動"> 散步/運動</label>
                            <label class="checkbox-item"><input type="checkbox" class="coping" value="找人談話"> 找人談話</label>
                            <label class="checkbox-item"><input type="checkbox" class="coping" value="睡眠"> 睡眠</label>
                        </div>
                        <label class="form-label" style="margin-top:12px;">其他應對方式</label>
                        <input type="text" id="copingOther" class="form-input" placeholder="如果上述選項未包含...">
                    </div>

                    <div class="form-group">
                        <label class="form-label">✨ 有沒有幫助？</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="radio" name="helpfulness" value="有幫助"> 有幫助</label>
                            <label class="checkbox-item"><input type="radio" name="helpfulness" value="沒幫助"> 沒幫助</label>
                            <label class="checkbox-item"><input type="radio" name="helpfulness" value="不確定"> 不確定</label>
                        </div>
                    </div>

                    <button class="save-btn" onclick="saveRecord()">💾 保存記錄</button>
                </div>
            </div>

            <div id="dailyTab" class="tab-content">
                <div style="background:#fff;padding:20px;border-radius:12px;">
                    <h3 style="font-size:20px;color:#0369a1;margin-bottom:15px;">📅 今日回饋</h3>
                    
                    <div class="form-group">
                        <label class="form-label">😴 睡眠狀況</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="radio" name="sleep" value="很好"> 很好</label>
                            <label class="checkbox-item"><input type="radio" name="sleep" value="還好"> 還好</label>
                            <label class="checkbox-item"><input type="radio" name="sleep" value="不好"> 不好</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">🏃 運動狀況</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="radio" name="exercise" value="有"> 有</label>
                            <label class="checkbox-item"><input type="radio" name="exercise" value="沒有"> 沒有</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">🍽️ 進食規律</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="radio" name="diet" value="規律"> 規律</label>
                            <label class="checkbox-item"><input type="radio" name="diet" value="不規律"> 不規律</label>
                        </div>
                    </div>

                    <button class="save-btn" onclick="saveDailyFeedback()">💾 保存一日回饋</button>
                </div>
            </div>

            <div id="recordsSection" class="records-section" style="display:none;">
                <div class="records-title">📝 最近的記錄</div>
                <div id="recordsList"></div>
            </div>
        </div>
    </div>

    <script>
        const REDIS_API_URL = "https://premium-mantis-146939.upstash.io";
        const REDIS_API_TOKEN = "gQAAAAAAAj37AAIgcDI1NzBlZDkyMjhlNjY0YmMyOGFlY2JlOWMzZDBiYTFkZg";
        const encouragements = ["✨ 你做得很好！","💪 繼續加油！","🌟 今天又更了解自己一點","💚 記錄自己是最好的自愛","🎯 每一次都在進步","✨ 你值得被傾聽","🌈 感受會過去，你會更堅強","💫 給自己一個擁抱","🎊 太棒了！","💝 你很重要","🌸 慢慢來，別著急","✨ 你在做對的事","🎵 深呼吸，你可以的","🌙 今天的你已經很努力了","💙 傾聽自己的聲音很勇敢"];

        function getRandomEncouragement(){return encouragements[Math.floor(Math.random()*encouragements.length)];}
        
        function switchTab(tab){
            document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
            document.getElementById(tab+'Tab').classList.add('active');
            event.target.classList.add('active');
        }

        async function redisSet(key,value){try{const response=await fetch(REDIS_API_URL+"/set/"+key,{method:"POST",headers:{"Authorization":"Bearer "+REDIS_API_TOKEN,"Content-Type":"application/json"},body:JSON.stringify({value:JSON.stringify(value)})});return response.ok;}catch(error){console.error("Redis set error:",error);return false;}}
        async function redisGet(key){try{const response=await fetch(REDIS_API_URL+"/get/"+key,{method:"GET",headers:{"Authorization":"Bearer "+REDIS_API_TOKEN}});const data=await response.json();return data.result?JSON.parse(data.result):null;}catch(error){console.error("Redis get error:",error);return null;}}
        async function redisDel(key){try{const response=await fetch(REDIS_API_URL+"/del/"+key,{method:"POST",headers:{"Authorization":"Bearer "+REDIS_API_TOKEN}});return response.ok;}catch(error){console.error("Redis delete error:",error);return false;}}
        async function redisKeys(pattern){try{const response=await fetch(REDIS_API_URL+"/keys/"+pattern,{method:"GET",headers:{"Authorization":"Bearer "+REDIS_API_TOKEN}});const data=await response.json();return data.result||[];}catch(error){console.error("Redis keys error:",error);return [];}}

        function showSuccess(msg){const el=document.getElementById('successMsg');el.textContent=msg+' '+getRandomEncouragement();el.style.display='block';setTimeout(()=>el.style.display='none',3000);}

        function handleLogin(){document.getElementById('loginPage').style.display='none';document.getElementById('mainPage').style.display='block';localStorage.setItem('username','訪客');loadRecords();}
        function handleLogout(){localStorage.removeItem('username');document.getElementById('loginPage').style.display='flex';document.getElementById('mainPage').style.display='none';}

        function updateIntensityDisplay(){const intensity=document.getElementById('intensity').value;const labels={1:'1 - 輕微',2:'2 - 輕微',3:'3 - 中輕',4:'4 - 中輕',5:'5 - 中度',6:'6 - 中度',7:'7 - 中重',8:'8 - 中重',9:'9 - 嚴重',10:'10 - 嚴重'};document.getElementById('intensityLabel').textContent=labels[intensity];}

        async function saveRecord(){const feeling=document.getElementById('feeling').value.trim();if(!feeling){alert('請輸入感受');return;}const record={id:Date.now().toString(),timestamp:new Date().toLocaleString('zh-Hant'),feeling:feeling,intensity:document.getElementById('intensity').value,bodySensations:Array.from(document.querySelectorAll('.bodySensation:checked')).map(el=>el.value),bodySensationOther:document.getElementById('bodySensationOther').value,trigger:document.getElementById('trigger').value,contact:document.querySelector('input[name="contact"]:checked')?.value||'',contactTime:document.querySelector('input[name="contactTime"]:checked')?.value||'',coping:Array.from(document.querySelectorAll('.coping:checked')).map(el=>el.value),copingOther:document.getElementById('copingOther').value,helpfulness:document.querySelector('input[name="helpfulness"]:checked')?.value||''};const key='record:'+record.id;const success=await redisSet(key,record);if(success){showSuccess('記錄已保存！');document.getElementById('feeling').value='';document.getElementById('bodySensationOther').value='';document.getElementById('trigger').value='';document.getElementById('copingOther').value='';document.getElementById('intensity').value='5';document.querySelectorAll('.bodySensation:checked').forEach(el=>el.checked=false);document.querySelectorAll('.coping:checked').forEach(el=>el.checked=false);document.querySelectorAll('input[type="radio"]:checked').forEach(el=>el.checked=false);updateIntensityDisplay();await new Promise(resolve=>setTimeout(resolve,500));loadRecords();}else{alert('保存失敗，請重試');}}

        async function saveDailyFeedback(){const sleep=document.querySelector('input[name="sleep"]:checked')?.value;const exercise=document.querySelector('input[name="exercise"]:checked')?.value;const diet=document.querySelector('input[name="diet"]:checked')?.value;if(!sleep||!exercise||!diet){alert('請填寫所有項目');return;}const key='daily:'+new Date().toDateString();const success=await redisSet(key,{sleep,exercise,diet,timestamp:new Date().toLocaleString('zh-Hant')});if(success){showSuccess('一日回饋已保存！');document.querySelectorAll('input[type="radio"]').forEach(el=>el.checked=false);}else{alert('保存失敗，請重試');}}

        let currentRecord=null;
        function openRecordModal(record){currentRecord=record;const sensations=record.bodySensations.slice();if(record.bodySensationOther)sensations.push(record.bodySensationOther);const coping=record.coping.slice();if(record.copingOther)coping.push(record.copingOther);let html='<div class="modal-detail-item"><span class="modal-detail-label">時間：</span>'+record.timestamp+'</div>';html+='<div class="modal-detail-item"><span class="modal-detail-label">強度：</span>'+record.intensity+'/10</div>';html+='<div class="modal-detail-item"><span class="modal-detail-label">感受：</span></div>';html+='<div style="background:#f0f9ff;padding:12px;border-radius:8px;margin-bottom:12px;">'+record.feeling+'</div>';if(record.trigger)html+='<div class="modal-detail-item"><span class="modal-detail-label">觸發點：</span>'+record.trigger+'</div>';if(sensations.length>0)html+='<div class="modal-detail-item"><span class="modal-detail-label">身體感受：</span>'+sensations.join(', ')+'</div>';if(record.contact)html+='<div class="modal-detail-item"><span class="modal-detail-label">與人接觸：</span>'+record.contact+'</div>';if(record.contactTime)html+='<div class="modal-detail-item"><span class="modal-detail-label">接觸時間：</span>'+record.contactTime+'</div>';if(coping.length>0)html+='<div class="modal-detail-item"><span class="modal-detail-label">應對方式：</span>'+coping.join(', ')+'</div>';if(record.helpfulness)html+='<div class="modal-detail-item"><span class="modal-detail-label">幫助程度：</span>'+record.helpfulness+'</div>';document.getElementById('modalBody').innerHTML=html;document.getElementById('recordModal').style.display='block';}

        function closeRecordModal(){document.getElementById('recordModal').style.display='none';currentRecord=null;}

        async function deleteCurrentRecord(){if(!currentRecord)return;if(!confirm('確定要刪除這筆記錄嗎？'))return;const key='record:'+currentRecord.id;const success=await redisDel(key);if(success){showSuccess('記錄已刪除！');closeRecordModal();loadRecords();}else{alert('刪除失敗');}}

        window.onclick=function(event){const modal=document.getElementById('recordModal');if(event.target===modal)closeRecordModal();};

        async function loadRecords(){try{const keys=await redisKeys('record:*');const records=[];for(let i=0;i<keys.length;i++){const record=await redisGet(keys[i]);if(record)records.push(record);}records.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));updateUI(records);}catch(error){console.error('加載失敗:',error);}}

        function updateUI(records){updateStats(records);updateRecordsList(records);}

        function updateStats(records){const weekDates=[];const weekDateObjects=[];const today=new Date();for(let i=6;i>=0;i--){const date=new Date(today);date.setDate(date.getDate()-i);weekDates.push(date.toLocaleDateString('zh-Hant'));weekDateObjects.push(new Date(date));}const weekCounts={};weekDates.forEach(date=>{weekCounts[date]=records.filter(r=>r.timestamp.startsWith(date)).length;});const dayNames=['日','一','二','三','四','五','六'];let html='';weekDates.forEach((date,idx)=>{const count=weekCounts[date];const dayName=dayNames[weekDateObjects[idx].getDay()];html+='<div class="day-card '+(count>0?'has-record':'')+'"><div style="font-size:11px;opacity:0.7;margin-bottom:4px;">'+dayName+'</div><div class="day-count">'+(count||'-')+'</div></div>';});document.getElementById('weekChart').innerHTML=html;let statsHTML='';if(records.length>0){const avgIntensity=(records.reduce((sum,r)=>sum+parseInt(r.intensity),0)/records.length).toFixed(1);const maxDay=Object.entries(weekCounts).reduce((a,b)=>b[1]>a[1]?b:a);statsHTML='<div class="stat-card"><div class="stat-label">本週總次數</div><div class="stat-value">'+records.length+'</div></div>';statsHTML+='<div class="stat-card"><div class="stat-label">平均強度</div><div class="stat-value">'+avgIntensity+'/10</div></div>';statsHTML+='<div class="stat-card"><div class="stat-label">最多記錄日期</div><div class="stat-value">'+maxDay[0]+'</div></div>';}document.getElementById('statsContainer').innerHTML=statsHTML;}

        function updateRecordsList(records){const container=document.getElementById('recordsList');const section=document.getElementById('recordsSection');if(records.length===0){section.style.display='none';return;}section.style.display='block';let html='';records.slice(0,10).forEach(record=>{html+='<div class="record-card" onclick="openRecordModal('+JSON.stringify(record).replace(/"/g,'&quot;')+')" style="cursor:pointer;"><div class="record-time">📅 '+record.timestamp+'</div><div class="record-intensity">💪 強度: '+record.intensity+'/10</div><div class="record-content">'+record.feeling.substring(0,100)+(record.feeling.length>100?'...':'')+'</div></div>';});container.innerHTML=html;}

        window.addEventListener('load',()=>{const loginEncouragement=document.getElementById('loginEncouragement');if(loginEncouragement)loginEncouragement.textContent='✨ '+getRandomEncouragement();if(localStorage.getItem('username')){document.getElementById('loginPage').style.display='none';document.getElementById('mainPage').style.display='block';loadRecords();}else{document.getElementById('loginPage').style.display='flex';document.getElementById('mainPage').style.display='none';}});
    </script>
</body>
</html>
