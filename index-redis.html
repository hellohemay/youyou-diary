<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😔 悠悠DIARY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #bae6fd;
            color: #0369a1;
            min-height: 100vh;
            padding-bottom: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: #0369a1;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.8;
        }

        .login-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }

        .login-card h2 {
            font-size: 32px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #0369a1, #0284c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-card p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #0284c7, #38bdf8);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.4);
        }

        .main-page {
            display: none;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            background: #cffafe;
            color: #0369a1;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: #0284c7;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .quick-record-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #0284c7, #38bdf8);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(2, 132, 199, 0.3);
        }

        .quick-record-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(2, 132, 199, 0.4);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #cffafe;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #0284c7;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .checkbox-item:hover {
            background: #cffafe;
        }

        .checkbox-item input {
            margin-right: 8px;
            cursor: pointer;
        }

        .intensity-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #38bdf8, #0284c7);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            margin-bottom: 8px;
        }

        .intensity-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #0284c7;
            cursor: pointer;
        }

        .intensity-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #0284c7;
            cursor: pointer;
            border: none;
        }

        .intensity-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #0284c7, #38bdf8);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
        }

        .success-msg {
            display: none;
            background: #cffafe;
            color: #0369a1;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .records-section {
            margin-top: 30px;
        }

        .records-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #0369a1;
        }

        .record-card {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #0284c7;
            position: relative;
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .record-time {
            font-size: 12px;
            color: #999;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .delete-btn:hover {
            opacity: 1;
        }

        .record-intensity {
            display: inline-block;
            background: #f0f9ff;
            color: #0369a1;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .record-content {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        .record-details {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #f0f0f0;
        }

        .stats-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .week-chart {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .day-card {
            background: #f0f9ff;
            padding: 12px 8px;
            border-radius: 8px;
            text-align: center;
        }

        .day-card.has-record {
            background: linear-gradient(135deg, #0284c7, #38bdf8);
            color: white;
        }

        .day-count {
            font-weight: 600;
            font-size: 16px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f0f9ff, #cffafe);
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid #0284c7;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #0284c7;
        }

        .loading {
            display: none;
            text-align: center;
            color: #0369a1;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- 登入頁面 -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <h2>😔 悠悠DIARY</h2>
            <p>當悠悠來敲門時<br/>請停下來，傾聽自己</p>
            <button class="login-btn" onclick="handleLogin()">📝 開始使用</button>
        </div>
    </div>

    <!-- 主頁面 -->
    <div id="mainPage" class="main-page">
        <div class="container">
            <div class="header">
                <h1>😔 悠悠DIARY</h1>
                <p>傾聽自己的聲音</p>
            </div>

            <div class="user-info">
                <span>👤 <span id="userName">訪客</span></span>
                <button class="logout-btn" onclick="handleLogout()">登出</button>
            </div>

            <div id="successMsg" class="success-msg"></div>

            <!-- 週統計 -->
            <div class="stats-section">
                <div style="font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #0369a1;">💡 本週悠悠</div>
                <div id="weekChart" class="week-chart"></div>

                <div id="statsContainer"></div>
            </div>

            <!-- 快速記錄按鈕 -->
            <button class="quick-record-btn" onclick="toggleRecordForm()">➕ 記錄悠悠</button>

            <!-- 記錄表單 -->
            <div id="recordForm" style="display: none; background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                <h3 style="font-size: 20px; color: #0369a1; margin-bottom: 5px;">😔 悠悠發生了什麼？</h3>

                <div class="form-group">
                    <label class="form-label">💭 感受</label>
                    <textarea id="feeling" class="form-input" placeholder="描述你現在的感受..." rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">⚡ 強度等級</label>
                    <input type="range" id="intensity" class="intensity-slider" min="1" max="10" value="5" oninput="updateIntensityDisplay()">
                    <div class="intensity-display">
                        <span>輕微</span>
                        <span style="font-weight: 600; color: #0284c7;" id="intensityLabel">5 - 中度</span>
                        <span>嚴重</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">🫀 身體感受</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" class="bodySensation" value="疲倦/無力"> 疲倦/無力
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" class="bodySensation" value="頭痛/身體痛"> 頭痛/身體痛
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" class="bodySensation" value="緊張/想抓東西/呼吸急速"> 緊張/想抓東西
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" class="bodySensation" value="胸悶/身體緊繃"> 胸悶/身體緊繃
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" class="bodySensation" value="身體重重"> 身體重重
                        </label>
                    </div>
                    <label class="form-label" style="margin-top: 12px;">其他身體感受（自由填寫）</label>
                    <input type="text" id="bodySensationOther" class="form-input" placeholder="如果上述選項未包含...">
                </div>

                <div class="form-group">
                    <label class="form-label">🎯 觸發點（可選）</label>
                    <input type="text" id="trigger" class="form-input" placeholder="是什麼觸發了悠悠？">
                </div>

                <div class="form-group">
                    <label class="form-label">👥 與人接觸人數</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="radio" name="contact" value="沒有人"> 沒有人
                        </label>
                        <label class="checkbox-item">
                            <input type="radio" name="contact" value="1-2人"> 1-2人
                        </label>
                        <label class="checkbox-item">
                            <input type="radio" name="contact" value="3-5人"> 3-5人
                        </label>
                        <label class="checkbox-item">
                            <input type="radio" name="contact" value="5人以上"> 5人以上
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">⏱️ 與人接觸時間</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="radio" name="contactTime" value="30分以內"> 30分以內
                        </label>
                        <label class="checkbox-item">
                            <input type="radio" name="contactTime" value="30分-2小時"> 30分-2小時
                        </label>
                        <label class="checkbox-item">
                            <input type="radio" name="contactTime" value="2-5小時"> 2-5小時
                        </label>
                        <label class="checkbox-item">
                            <input type="radio" name="contactTime" value="5小時以上"> 5小時以上
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">🎯 你現在做了什麼？</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" class="coping" value="純紀錄"> 純紀錄
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" class="coping" value="深呼吸/拍拍自己"> 深呼吸/拍拍自己
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" class="coping" value="聽音樂"> 聽音樂
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" class="coping" value="散步/運動"> 散步/運動
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" class="coping" value="找人談話"> 找人談話
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" class="coping" value="睡眠"> 睡眠
                        </label>
                    </div>
                    <label class="form-label" style="margin-top: 12px;">其他應對方式（自由填寫）</label>
                    <input type="text" id="copingOther" class="form-input" placeholder="如果上述選項未包含...">
                </div>

                <div class="form-group">
                    <label class="form-label">✨ 有沒有幫助？</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="radio" name="helpfulness" value="有幫助"> 有幫助
                        </label>
                        <label class="checkbox-item">
                            <input type="radio" name="helpfulness" value="沒幫助"> 沒幫助
                        </label>
                        <label class="checkbox-item">
                            <input type="radio" name="helpfulness" value="不確定"> 不確定
                        </label>
                    </div>
                </div>

                <button class="save-btn" onclick="saveRecord()">💾 保存記錄</button>
            </div>

            <!-- 記錄列表 -->
            <div id="recordsSection" class="records-section" style="display: none;">
                <div class="records-title">📝 最近的記錄</div>
                <div id="recordsList"></div>
            </div>

            <div id="loading" class="loading">加載中...</div>
        </div>
    </div>

    <script>
        // ========== 隨機鼓勵語 ==========
        const encouragements = [
            '✨ 你做得很好！',
            '💪 繼續加油！',
            '🌟 今天又更了解自己一點',
            '💚 記錄自己是最好的自愛',
            '🎯 每一次都在進步',
            '✨ 你值得被傾聽',
            '🌈 感受會過去，你會更堅強',
            '💫 給自己一個擁抱',
            '🎊 太棒了！',
            '💝 你很重要',
            '🌸 慢慢來，別著急',
            '✨ 你在做對的事',
            '🎵 深呼吸，你可以的',
            '🌙 今天的你已經很努力了',
            '💙 傾聽自己的聲音很勇敢'
        ];

        function getRandomEncouragement() {
            return encouragements[Math.floor(Math.random() * encouragements.length)];
        }

        // ========== Redis API 設置 ==========
        const REDIS_API_URL = "https://premium-mantis-146939.upstash.io";
        const REDIS_API_TOKEN = "gQAAAAAAAj37AAIgcDI1NzBlZDkyMjhlNjY0YmMyOGFlY2JlOWMzZDBiYTFkZg";

        // ========== Redis 操作 ==========
        async function redisSet(key, value) {
            try {
                const response = await fetch(`${REDIS_API_URL}/set/${key}`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${REDIS_API_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ value: JSON.stringify(value) })
                });
                return response.ok;
            } catch (error) {
                console.error("Redis set error:", error);
                return false;
            }
        }

        async function redisGet(key) {
            try {
                const response = await fetch(`${REDIS_API_URL}/get/${key}`, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${REDIS_API_TOKEN}`
                    }
                });
                const data = await response.json();
                return data.result ? JSON.parse(data.result) : null;
            } catch (error) {
                console.error("Redis get error:", error);
                return null;
            }
        }

        async function redisDel(key) {
            try {
                const response = await fetch(`${REDIS_API_URL}/del/${key}`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${REDIS_API_TOKEN}`
                    }
                });
                return response.ok;
            } catch (error) {
                console.error("Redis delete error:", error);
                return false;
            }
        }

        async function redisKeys(pattern) {
            try {
                const response = await fetch(`${REDIS_API_URL}/keys/${pattern}`, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${REDIS_API_TOKEN}`
                    }
                });
                const data = await response.json();
                return data.result || [];
            } catch (error) {
                console.error("Redis keys error:", error);
                return [];
            }
        }

        // ========== 顯示成功訊息 ==========
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            const encouragement = getRandomEncouragement();
            el.textContent = msg + ' ' + encouragement;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        // ========== 登入/登出 ==========
        function handleLogin() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
            localStorage.setItem('username', '訪客');
            loadRecords();
        }

        function handleLogout() {
            localStorage.removeItem('username');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('mainPage').style.display = 'none';
            document.getElementById('recordForm').style.display = 'none';
        }

        // ========== 強度顯示 ==========
        function updateIntensityDisplay() {
            const intensity = document.getElementById('intensity').value;
            const labels = {
                1: '1 - 輕微', 2: '2 - 輕微', 3: '3 - 中輕', 4: '4 - 中輕',
                5: '5 - 中度', 6: '6 - 中度', 7: '7 - 中重', 8: '8 - 中重',
                9: '9 - 嚴重', 10: '10 - 嚴重'
            };
            document.getElementById('intensityLabel').textContent = labels[intensity];
        }

        // ========== 記錄表單 ==========
        function toggleRecordForm() {
            const form = document.getElementById('recordForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        async function saveRecord() {
            const record = {
                id: Date.now().toString(),
                timestamp: new Date().toLocaleString('zh-Hant'),
                feeling: document.getElementById('feeling').value,
                intensity: document.getElementById('intensity').value,
                bodySensations: Array.from(document.querySelectorAll('.bodySensation:checked')).map(el => el.value),
                bodySensationOther: document.getElementById('bodySensationOther').value,
                trigger: document.getElementById('trigger').value,
                contact: document.querySelector('input[name="contact"]:checked')?.value || '',
                contactTime: document.querySelector('input[name="contactTime"]:checked')?.value || '',
                coping: Array.from(document.querySelectorAll('.coping:checked')).map(el => el.value),
                copingOther: document.getElementById('copingOther').value,
                helpfulness: document.querySelector('input[name="helpfulness"]:checked')?.value || ''
            };

            if (!record.feeling.trim()) {
                alert('請輸入感受');
                return;
            }

            const key = `record:${record.id}`;
            const success = await redisSet(key, record);

            if (success) {
                showSuccess('記錄已保存！');
                document.getElementById('recordForm').reset();
                updateIntensityDisplay();
                document.getElementById('recordForm').style.display = 'none';
                loadRecords();
            } else {
                alert('保存失敗，請重試');
            }
        }

        async function deleteRecord(recordId) {
            if (!confirm('確定要刪除這筆記錄嗎？')) return;

            const key = `record:${recordId}`;
            const success = await redisDel(key);

            if (success) {
                showSuccess('記錄已刪除！');
                loadRecords();
            } else {
                alert('刪除失敗');
            }
        }

        // ========== 加載記錄 ==========
        async function loadRecords() {
            document.getElementById('loading').style.display = 'block';

            try {
                const keys = await redisKeys('record:*');
                const records = [];

                for (const key of keys) {
                    const record = await redisGet(key);
                    if (record) records.push(record);
                }

                records.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                updateUI(records);
            } catch (error) {
                console.error('加載失敗:', error);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function updateUI(records) {
            updateStats(records);
            updateRecordsList(records);
        }

        function updateStats(records) {
            const weekDates = [];
            const weekDateObjects = [];
            const today = new Date();

            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                weekDates.push(date.toLocaleDateString('zh-Hant'));
                weekDateObjects.push(new Date(date));
            }

            const weekCounts = {};
            weekDates.forEach(date => {
                weekCounts[date] = records.filter(r => r.timestamp.startsWith(date)).length;
            });

            const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
            let html = '';
            weekDates.forEach((date, idx) => {
                const count = weekCounts[date];
                const dayName = dayNames[weekDateObjects[idx].getDay()];
                html += `
                    <div class="day-card ${count > 0 ? 'has-record' : ''}">
                        <div style="font-size: 11px; opacity: 0.7; margin-bottom: 4px;">${dayName}</div>
                        <div class="day-count">${count || '-'}</div>
                    </div>
                `;
            });
            document.getElementById('weekChart').innerHTML = html;

            // 統計資訊
            let statsHTML = '';
            if (records.length > 0) {
                const avgIntensity = (records.reduce((sum, r) => sum + parseInt(r.intensity), 0) / records.length).toFixed(1);
                const maxDay = Object.entries(weekCounts).reduce((a, b) => b[1] > a[1] ? b : a);

                statsHTML = `
                    <div class="stat-card">
                        <div class="stat-label">本週總次數</div>
                        <div class="stat-value">${records.length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">平均強度</div>
                        <div class="stat-value">${avgIntensity}/10</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">最多記錄日期</div>
                        <div class="stat-value">${maxDay[0]}</div>
                    </div>
                `;
            }
            document.getElementById('statsContainer').innerHTML = statsHTML;
        }

        function updateRecordsList(records) {
            const container = document.getElementById('recordsList');
            const section = document.getElementById('recordsSection');

            if (records.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';

            let html = '';
            records.slice(0, 10).forEach(record => {
                const sensations = [...record.bodySensations];
                if (record.bodySensationOther) sensations.push(record.bodySensationOther);

                const coping = [...record.coping];
                if (record.copingOther) coping.push(record.copingOther);

                html += `
                    <div class="record-card">
                        <div class="record-header">
                            <div class="record-time">${record.timestamp}</div>
                            <button class="delete-btn" onclick="deleteRecord('${record.id}')">刪除</button>
                        </div>
                        <div class="record-intensity">強度: ${record.intensity}/10</div>
                        <div class="record-content">${record.feeling}</div>
                        <div class="record-details">
                            ${record.trigger ? `<div>觸發點: ${record.trigger}</div>` : ''}
                            ${sensations.length > 0 ? `<div>身體感受: ${sensations.join(', ')}</div>` : ''}
                            ${record.contact ? `<div>與人接觸: ${record.contact}</div>` : ''}
                            ${record.contactTime ? `<div>接觸時間: ${record.contactTime}</div>` : ''}
                            ${coping.length > 0 ? `<div>應對方式: ${coping.join(', ')}</div>` : ''}
                            ${record.helpfulness ? `<div>幫助程度: ${record.helpfulness}</div>` : ''}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // ========== 初始化 ==========
        window.addEventListener('load', () => {
            if (localStorage.getItem('username')) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainPage').style.display = 'block';
                loadRecords();
            } else {
                document.getElementById('loginPage').style.display = 'flex';
                document.getElementById('mainPage').style.display = 'none';
            }
        });
    </script>
</body>
</html>
